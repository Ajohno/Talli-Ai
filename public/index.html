<!-- public/index.html -->
<!-- Browser code: NEVER put GROQ_API_KEY here. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Groq Llama Agent Demo</title>
    <style>
      body {
        font-family: system-ui, Arial, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
      }
      textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        font-size: 16px;
      }
      button {
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }
      pre {
        white-space: pre-wrap;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Groq-hosted Llama “Agent”</h1>

    <p>
      Try: <code>What time is it?</code> or <code>What is (25 * 4) + 10?</code>
    </p>

    <textarea id="prompt" placeholder="Ask the agent something..."></textarea>
    <button id="send">Run Agent</button>

    <pre id="out">Output will appear here...</pre>

    <script src="app.js"></script>
  </body>
</html>
