<!-- public/index.html -->
<!-- Browser code: NEVER put GROQ_API_KEY here. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Talli Chat</title>
    <meta name="theme-color" content="#0d1110" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Talli" />
    <link rel="icon" type="image/svg+xml" href="/icons/talli-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/talli-icon.svg" />
    <link rel="apple-touch-icon-precomposed" href="/icons/talli-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      :root {
        --bg-top: #0d1110;
        --bg-bottom: #1f2a1a;
        --panel: rgba(13, 17, 16, 0.88);
        --panel-border: rgba(212, 175, 55, 0.24);
        --ink: #f6f2df;
        --muted: #b9c7a6;
        --assistant: #162117;
        --assistant-border: #2f4a2e;
        --user: #8f6f20;
        --user-ink: #fff8e1;
        --accent: #d4af37;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(212, 175, 55, 0.18), transparent 34%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(8px);
      }

      body::before {
        top: 72px;
        right: 8vw;
        width: 180px;
        height: 180px;
        background: rgba(212, 175, 55, 0.22);
      }

      body::after {
        left: 5vw;
        bottom: 80px;
        width: 240px;
        height: 240px;
        background: rgba(73, 122, 63, 0.2);
      }

      .app-shell {
        width: min(960px, calc(100vw - 32px));
        height: min(860px, calc(100vh - 32px));
        margin: 16px auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 24px 18px;
        border-bottom: 1px solid rgba(212, 175, 55, 0.18);
        background: linear-gradient(180deg, rgba(212, 175, 55, 0.12), rgba(13, 17, 16, 0));
      }

      .title-wrap h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .title-wrap p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(22, 33, 23, 0.82);
        border: 1px solid rgba(212, 175, 55, 0.2);
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-pill::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #6bbf59;
        box-shadow: 0 0 0 6px rgba(107, 191, 89, 0.2);
      }

      .messages {
        padding: 22px 18px 10px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        display: flex;
      }

      .message[data-role="user"] {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(78%, 680px);
        padding: 14px 16px;
        border-radius: 22px;
        border: 1px solid var(--assistant-border);
        background: var(--assistant);
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.28);
      }

      .message[data-role="user"] .bubble {
        background: var(--user);
        color: var(--user-ink);
        border-color: transparent;
      }

      .bubble.is-pending {
        opacity: 0.72;
      }

      .message-role {
        display: block;
        margin-bottom: 6px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .message[data-role="user"] .message-role {
        color: rgba(255, 248, 225, 0.78);
      }

      .message-body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.55;
        font-size: 1rem;
      }

      .composer-wrap {
        padding: 16px;
        border-top: 1px solid rgba(212, 175, 55, 0.18);
        background: rgba(12, 19, 12, 0.9);
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        padding: 12px;
        border-radius: 22px;
        background: rgba(18, 27, 18, 0.95);
        border: 1px solid rgba(212, 175, 55, 0.24);
        box-shadow: inset 0 1px 0 rgba(212, 175, 55, 0.12);
      }

      textarea {
        width: 100%;
        min-height: 56px;
        max-height: 180px;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--ink);
        font: inherit;
        line-height: 1.5;
      }

      textarea::placeholder {
        color: #8da77d;
      }

      .send-button {
        border: 0;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        padding: 0;
        background: linear-gradient(135deg, #d4af37, #8f6f20);
        color: #0d1110;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        box-shadow: 0 12px 18px rgba(0, 0, 0, 0.34);
      }

      .send-button svg {
        width: 22px;
        height: 22px;
      }

      .send-button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      .send-button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .composer-footnote {
        margin: 10px 4px 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @media (max-width: 720px) {
        .app-shell {
          width: 100vw;
          height: 100vh;
          margin: 0;
          border-radius: 0;
        }

        .chat-topbar {
          padding: 18px 16px 14px;
          align-items: flex-start;
          gap: 12px;
          flex-direction: column;
        }

        .bubble {
          max-width: 88%;
        }

        .composer {
          grid-template-columns: 1fr auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="chat-topbar">
        <div class="title-wrap">
          <h1>Talli Chat</h1>
          <p>Continuous back-and-forth with tool-using responses.</p>
        </div>
        <div class="status-pill" id="status">Connected</div>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <div class="composer-wrap">
        <form class="composer" id="composer">
          <textarea
            id="prompt"
            placeholder="Message Talli..."
            rows="1"
          ></textarea>
          <button id="send" class="send-button" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M4 19L21 12L4 5L4.01 10.5L16 12L4.01 13.5L4 19Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </form>
        <p class="composer-footnote">
          Press Enter to send. Use Shift+Enter for a new line.
        </p>
      </div>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="bubble">
          <span class="message-role"></span>
          <p class="message-body"></p>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
