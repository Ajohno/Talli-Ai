<!-- public/index.html -->
<!-- Browser code: NEVER put GROQ_API_KEY here. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Talli Chat</title>
    <style>
      :root {
        --bg-top: #f6efe6;
        --bg-bottom: #d9e4ec;
        --panel: rgba(255, 252, 247, 0.82);
        --panel-border: rgba(68, 57, 47, 0.12);
        --ink: #201b16;
        --muted: #6f655d;
        --assistant: #fff7ef;
        --assistant-border: #e6d5c4;
        --user: #1d4d63;
        --user-ink: #f4f8fb;
        --accent: #b7653c;
        --shadow: 0 24px 60px rgba(32, 27, 22, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(8px);
      }

      body::before {
        top: 72px;
        right: 8vw;
        width: 180px;
        height: 180px;
        background: rgba(183, 101, 60, 0.18);
      }

      body::after {
        left: 5vw;
        bottom: 80px;
        width: 240px;
        height: 240px;
        background: rgba(29, 77, 99, 0.14);
      }

      .app-shell {
        width: min(960px, calc(100vw - 32px));
        height: min(860px, calc(100vh - 32px));
        margin: 16px auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 24px 18px;
        border-bottom: 1px solid rgba(68, 57, 47, 0.08);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
      }

      .title-wrap h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .title-wrap p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(68, 57, 47, 0.08);
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-pill::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #57a773;
        box-shadow: 0 0 0 6px rgba(87, 167, 115, 0.14);
      }

      .messages {
        padding: 22px 18px 10px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        display: flex;
      }

      .message[data-role="user"] {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(78%, 680px);
        padding: 14px 16px;
        border-radius: 22px;
        border: 1px solid var(--assistant-border);
        background: var(--assistant);
        box-shadow: 0 12px 22px rgba(87, 72, 59, 0.08);
      }

      .message[data-role="user"] .bubble {
        background: var(--user);
        color: var(--user-ink);
        border-color: transparent;
      }

      .bubble.is-pending {
        opacity: 0.72;
      }

      .message-role {
        display: block;
        margin-bottom: 6px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .message[data-role="user"] .message-role {
        color: rgba(244, 248, 251, 0.72);
      }

      .message-body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.55;
        font-size: 1rem;
      }

      .composer-wrap {
        padding: 16px;
        border-top: 1px solid rgba(68, 57, 47, 0.08);
        background: rgba(250, 245, 238, 0.84);
      }

      .composer-stage {
        position: relative;
        padding-top: 54px;
      }

      .typing-character {
        position: absolute;
        top: 2px;
        left: 0;
        width: 72px;
        height: 72px;
        transform: translateX(0);
        transition: transform 120ms linear, opacity 120ms ease;
        pointer-events: none;
        opacity: 0;
        filter: drop-shadow(0 7px 10px rgba(32, 27, 22, 0.12));
      }

      .typing-character svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .typing-character.is-active {
        opacity: 1;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        padding: 12px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(68, 57, 47, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      textarea {
        width: 100%;
        min-height: 56px;
        max-height: 180px;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--ink);
        font: inherit;
        line-height: 1.5;
      }

      textarea::placeholder {
        color: #8a7f76;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        background: linear-gradient(135deg, #c56e43, #9d4c31);
        color: #fff8f3;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        box-shadow: 0 12px 18px rgba(157, 76, 49, 0.28);
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .composer-footnote {
        margin: 10px 4px 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @media (max-width: 720px) {
        .app-shell {
          width: 100vw;
          height: 100vh;
          margin: 0;
          border-radius: 0;
        }

        .chat-topbar {
          padding: 18px 16px 14px;
          align-items: flex-start;
          gap: 12px;
          flex-direction: column;
        }

        .bubble {
          max-width: 88%;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="chat-topbar">
        <div class="title-wrap">
          <h1>Talli Chat</h1>
          <p>Continuous back-and-forth with tool-using responses.</p>
        </div>
        <div class="status-pill" id="status">Connected</div>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <div class="composer-wrap">
        <div class="composer-stage" id="composerStage">
          <div class="typing-character" id="typingCharacter" aria-hidden="true">
            <svg viewBox="0 0 128 128" role="presentation" focusable="false">
              <path
                d="M41 56 C27 44, 18 42, 14 44 C15 58, 24 72, 39 80"
                fill="none"
                stroke="#34364f"
                stroke-width="7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M52 48 C40 30, 31 22, 24 20 C23 39, 35 60, 57 66"
                fill="#a4c74c"
                stroke="#34364f"
                stroke-width="7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M42 52 C32 42, 25 39, 20 39 C22 52, 30 66, 46 72"
                fill="#9abc45"
                stroke="#34364f"
                stroke-width="7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M43 102 C29 83, 26 64, 38 49 C49 35, 67 33, 85 41 C71 44, 62 52, 55 66 C49 78, 47 90, 43 102 Z"
                fill="#ec8d3c"
                stroke="#34364f"
                stroke-width="7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M59 46 C72 38, 89 39, 106 45 C94 44, 84 49, 74 59"
                fill="none"
                stroke="#34364f"
                stroke-width="7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M53 61 C57 73, 68 78, 81 73"
                fill="none"
                stroke="#34364f"
                stroke-width="7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M48 95 C37 80, 35 66, 45 54 C54 44, 69 42, 79 46 C67 50, 58 59, 53 72"
                fill="none"
                stroke="#f6bf81"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <form class="composer" id="composer">
            <textarea
              id="prompt"
              placeholder="Message Talli..."
              rows="1"
            ></textarea>
            <button id="send" type="submit">Send</button>
          </form>
        </div>
        <p class="composer-footnote">
          Press Enter to send. Use Shift+Enter for a new line.
        </p>
      </div>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="bubble">
          <span class="message-role"></span>
          <p class="message-body"></p>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
