<!-- public/index.html -->
<!-- Browser code: NEVER put GROQ_API_KEY here. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Talli Chat</title>
    <style>
      :root {
        --bg-top: #f6efe6;
        --bg-bottom: #d9e4ec;
        --panel: rgba(255, 252, 247, 0.82);
        --panel-border: rgba(68, 57, 47, 0.12);
        --ink: #201b16;
        --muted: #6f655d;
        --assistant: #fff7ef;
        --assistant-border: #e6d5c4;
        --user: #1d4d63;
        --user-ink: #f4f8fb;
        --accent: #b7653c;
        --shadow: 0 24px 60px rgba(32, 27, 22, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(8px);
      }

      body::before {
        top: 72px;
        right: 8vw;
        width: 180px;
        height: 180px;
        background: rgba(183, 101, 60, 0.18);
      }

      body::after {
        left: 5vw;
        bottom: 80px;
        width: 240px;
        height: 240px;
        background: rgba(29, 77, 99, 0.14);
      }

      .app-shell {
        width: min(960px, calc(100vw - 32px));
        height: min(860px, calc(100vh - 32px));
        margin: 16px auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 24px 18px;
        border-bottom: 1px solid rgba(68, 57, 47, 0.08);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
      }

      .title-wrap h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .title-wrap p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(68, 57, 47, 0.08);
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-pill::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #57a773;
        box-shadow: 0 0 0 6px rgba(87, 167, 115, 0.14);
      }

      .messages {
        padding: 22px 18px 10px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        display: flex;
      }

      .message[data-role="user"] {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(78%, 680px);
        padding: 14px 16px;
        border-radius: 22px;
        border: 1px solid var(--assistant-border);
        background: var(--assistant);
        box-shadow: 0 12px 22px rgba(87, 72, 59, 0.08);
      }

      .message[data-role="user"] .bubble {
        background: var(--user);
        color: var(--user-ink);
        border-color: transparent;
      }

      .bubble.is-pending {
        opacity: 0.72;
      }

      .message-role {
        display: block;
        margin-bottom: 6px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .message[data-role="user"] .message-role {
        color: rgba(244, 248, 251, 0.72);
      }

      .message-body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.55;
        font-size: 1rem;
      }

      .composer-wrap {
        padding: 16px;
        border-top: 1px solid rgba(68, 57, 47, 0.08);
        background: rgba(250, 245, 238, 0.84);
      }

      .composer-stage {
        position: relative;
        padding-top: 54px;
      }

      .typing-character {
        position: absolute;
        top: 2px;
        left: 0;
        width: 84px;
        height: 84px;
        transform: translateX(0);
        transition: transform 140ms linear, opacity 120ms ease;
        pointer-events: none;
        opacity: 0;
        filter: drop-shadow(0 10px 14px rgba(32, 27, 22, 0.16));
      }

      .typing-character.is-active {
        opacity: 1;
      }

      .typing-character-inner {
        width: 100%;
        height: 100%;
        animation: birdFloat 1.7s ease-in-out infinite;
        transform-origin: center;
      }

      .typing-character svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .wing-back {
        transform-origin: 28px 22px;
        animation: wingFlapBack 0.34s ease-in-out infinite;
      }

      .wing-front {
        transform-origin: 36px 20px;
        animation: wingFlapFront 0.34s ease-in-out infinite;
      }

      .eye-pupil {
        transition: transform 120ms ease;
      }

      @keyframes birdFloat {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }

        50% {
          transform: translateY(-6px) rotate(-2deg);
        }
      }

      @keyframes wingFlapBack {
        0%,
        100% {
          transform: rotate(-8deg) scale(1);
        }

        50% {
          transform: rotate(12deg) scale(1.03);
        }
      }

      @keyframes wingFlapFront {
        0%,
        100% {
          transform: rotate(2deg) scale(1);
        }

        50% {
          transform: rotate(-18deg) scale(1.04);
        }
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        padding: 12px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(68, 57, 47, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      textarea {
        width: 100%;
        min-height: 56px;
        max-height: 180px;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--ink);
        font: inherit;
        line-height: 1.5;
      }

      textarea::placeholder {
        color: #8a7f76;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        background: linear-gradient(135deg, #c56e43, #9d4c31);
        color: #fff8f3;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        box-shadow: 0 12px 18px rgba(157, 76, 49, 0.28);
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .composer-footnote {
        margin: 10px 4px 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @media (max-width: 720px) {
        .app-shell {
          width: 100vw;
          height: 100vh;
          margin: 0;
          border-radius: 0;
        }

        .chat-topbar {
          padding: 18px 16px 14px;
          align-items: flex-start;
          gap: 12px;
          flex-direction: column;
        }

        .bubble {
          max-width: 88%;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="chat-topbar">
        <div class="title-wrap">
          <h1>Talli Chat</h1>
          <p>Continuous back-and-forth with tool-using responses.</p>
        </div>
        <div class="status-pill" id="status">Connected</div>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <div class="composer-wrap">
        <div class="composer-stage" id="composerStage">
          <div class="typing-character" id="typingCharacter" aria-hidden="true">
            <div class="typing-character-inner">
              <svg viewBox="0 0 100 100" role="presentation" focusable="false">
                <g class="wing-back">
                  <path
                    d="M33 28 C20 13, 15 10, 14 14 C13 30, 20 43, 34 44 C42 44, 44 36, 33 28 Z"
                    fill="#8bb33f"
                    stroke="#32344a"
                    stroke-width="4"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M30 26 C22 18, 19 17, 18 19 C19 28, 23 35, 31 38"
                    fill="none"
                    stroke="#b8d66a"
                    stroke-width="4"
                    stroke-linecap="round"
                  />
                </g>

                <g class="wing-front">
                  <path
                    d="M46 21 C34 6, 30 3, 29 8 C27 24, 35 37, 48 39 C57 40, 58 30, 46 21 Z"
                    fill="#9fc34a"
                    stroke="#32344a"
                    stroke-width="4"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M44 19 C37 12, 34 11, 33 13 C34 21, 39 29, 45 33"
                    fill="none"
                    stroke="#c8e07f"
                    stroke-width="4"
                    stroke-linecap="round"
                  />
                </g>

                <path
                  d="M46 38 C54 28, 67 25, 77 30 C84 34, 83 41, 76 45 C67 51, 58 50, 53 56 C47 64, 46 75, 44 86 L33 74 C34 60, 38 47, 46 38 Z"
                  fill="#ef9441"
                  stroke="#32344a"
                  stroke-width="4"
                  stroke-linejoin="round"
                />
                <path
                  d="M49 39 C55 32, 66 29, 74 33 C67 33, 59 37, 53 45 C47 53, 43 63, 40 76"
                  fill="none"
                  stroke="#f6be82"
                  stroke-width="4"
                  stroke-linecap="round"
                />
                <path
                  d="M58 36 C68 31, 81 31, 91 35"
                  fill="none"
                  stroke="#32344a"
                  stroke-width="4"
                  stroke-linecap="round"
                />
                <path
                  d="M57 48 C61 53, 69 54, 78 49"
                  fill="none"
                  stroke="#32344a"
                  stroke-width="4"
                  stroke-linecap="round"
                />
                <circle cx="61" cy="39" r="4.2" fill="#ffffff" />
                <g class="eye-pupil" id="typingPupil">
                  <circle cx="61.5" cy="39.3" r="1.8" fill="#32344a" />
                </g>
              </svg>
            </div>
          </div>
          <form class="composer" id="composer">
            <textarea
              id="prompt"
              placeholder="Message Talli..."
              rows="1"
            ></textarea>
            <button id="send" type="submit">Send</button>
          </form>
        </div>
        <p class="composer-footnote">
          Press Enter to send. Use Shift+Enter for a new line.
        </p>
      </div>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="bubble">
          <span class="message-role"></span>
          <p class="message-body"></p>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
